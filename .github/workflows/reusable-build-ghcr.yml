name: reusable-build-ghcr

on:
  workflow_call:
    inputs:
      context:
        description: Docker build context relative to the caller repository root.
        required: false
        type: string
        default: "."
      dockerfile:
        description: Dockerfile path relative to the caller repository root.
        required: false
        type: string
        default: "docker/Dockerfile"
      image_name:
        description: Optional override for the GHCR image name.
        required: false
        type: string
        default: ""
      cache_scope:
        description: Optional override for the GitHub Actions build cache scope.
        required: false
        type: string
        default: ""
      runs_on:
        description: JSON-encoded runs-on value for the build job.
        required: false
        type: string
        default: '["self-hosted","Linux","X64","ci-heavy"]'

env:
  REGISTRY: ghcr.io

jobs:
  build:
    runs-on: ${{ fromJSON(inputs.runs_on) }}
    timeout-minutes: 45
    concurrency:
      group: build-ghcr-${{ github.repository }}-${{ github.ref }}
      cancel-in-progress: true
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 1
          submodules: recursive
          token: ${{ secrets.GH_PAT || github.token }}

      - name: Validate Docker inputs
        shell: bash
        run: |
          set -euo pipefail

          context_path="${{ inputs.context }}"
          dockerfile_path="${{ inputs.dockerfile }}"

          if [[ ! -d "$context_path" ]]; then
            echo "Docker context does not exist: $context_path" >&2
            exit 1
          fi

          if [[ ! -f "$dockerfile_path" ]]; then
            echo "Dockerfile does not exist: $dockerfile_path" >&2
            exit 1
          fi

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to registry
        uses: docker/login-action@v4
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GH_PAT || github.token }}

      - name: Prepare image name
        id: image
        shell: bash
        run: |
          set -euo pipefail

          owner=$(echo "${{ github.repository_owner }}" | tr '[:upper:]' '[:lower:]')
          repo_name="${{ github.event.repository.name }}"

          image_name="${{ inputs.image_name }}"
          if [[ -z "$image_name" ]]; then
            image_name="leavepulse-$repo_name"
          fi

          cache_scope="${{ inputs.cache_scope }}"
          if [[ -z "$cache_scope" ]]; then
            cache_scope="${repo_name}-build"
          fi

          echo "name=${{ env.REGISTRY }}/$owner/$image_name" >> "$GITHUB_OUTPUT"
          echo "cache_scope=$cache_scope" >> "$GITHUB_OUTPUT"

      - name: Docker meta
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: |
            ${{ steps.image.outputs.name }}
          flavor: |
            latest=true
          tags: |
            type=sha

      - name: Check existing image tags
        id: existing
        shell: bash
        run: |
          set -euo pipefail

          missing=false
          while IFS= read -r tag; do
            [[ -n "$tag" ]] || continue
            if ! docker buildx imagetools inspect "$tag" >/dev/null 2>&1; then
              missing=true
              break
            fi
          done <<< "${{ steps.meta.outputs.tags }}"

          if [[ "$missing" == "false" ]]; then
            echo "All image tags already exist; skipping rebuild."
            echo "skip=true" >> "$GITHUB_OUTPUT"
          else
            echo "skip=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Build and push
        if: steps.existing.outputs.skip != 'true'
        id: build
        uses: docker/build-push-action@v6
        with:
          context: ${{ inputs.context }}
          file: ${{ inputs.dockerfile }}
          push: true
          provenance: false
          sbom: false
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha,scope=${{ steps.image.outputs.cache_scope }}
          cache-to: type=gha,scope=${{ steps.image.outputs.cache_scope }},mode=min,ignore-error=true
          secrets: | # pragma: allowlist secret
            github_token=${{ secrets.GH_PAT || github.token }}
