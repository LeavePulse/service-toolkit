name: reusable-rust-quality

# Generic quality gate for Rust workspaces. Runs `cargo fmt --check`,
# `cargo clippy -D warnings`, and `cargo test`. Nothing about the
# workflow is bound to a particular UI stack — callers that need a
# frontend toolchain or Tauri system libs pass them through inputs.

on:
  workflow_call:
    inputs:
      rust_toolchain:
        description: Rust toolchain channel to install (e.g. "stable", "1.80", "nightly").
        required: false
        type: string
        default: "stable"
      rust_components:
        description: Comma-separated extra rustup components beyond rustfmt+clippy.
        required: false
        type: string
        default: ""
      cargo_features:
        description: Explicit `--features` flags forwarded to clippy/test (space-separated). Takes precedence over `all_features`.
        required: false
        type: string
        default: ""
      all_features:
        description: Pass `--all-features` to clippy/test. Off by default because native-dep graphs routinely surface mutually-exclusive features under `--all-features`.
        required: false
        type: boolean
        default: false
      cargo_test_args:
        description: Extra args passed to `cargo test` (e.g. "--workspace --exclude foo").
        required: false
        type: string
        default: "--workspace"
      clippy_args:
        description: Extra args appended to the `cargo clippy` invocation before `-- -D warnings` (e.g. "--workspace --exclude foo").
        required: false
        type: string
        default: "--workspace"
      apt_packages:
        description: Space-separated apt packages required by the project's native crates. Anything beyond `build-essential pkg-config libssl-dev` (already installed) is up to the caller.
        required: false
        type: string
        default: ""
      pre_cargo_command:
        description: |
          Optional shell command run after toolchain setup but before fmt/clippy/test.
          Use this when crates' build.rs needs side artifacts (e.g. a Bun frontend
          build that has to populate `dist/` before Tauri's build.rs runs).
          Executed from the repository root.
        required: false
        type: string
        default: ""
      submodules:
        description: Submodule checkout strategy ("true", "recursive", or "false").
        required: false
        type: string
        default: "recursive"

jobs:
  quality:
    runs-on: [self-hosted, Linux, X64, ci-default]
    timeout-minutes: 30
    permissions:
      contents: read
    concurrency:
      group: rust-quality-${{ github.repository }}-${{ github.ref }}
      cancel-in-progress: true

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 1
          submodules: ${{ inputs.submodules }}
          token: ${{ secrets.GH_PAT || github.token }}

      - name: Install system dependencies
        shell: bash
        run: |
          set -euo pipefail
          packages="build-essential pkg-config libssl-dev ${{ inputs.apt_packages }}"
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends $packages

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@master
        with:
          toolchain: ${{ inputs.rust_toolchain }}
          components: rustfmt, clippy${{ inputs.rust_components != '' && format(', {0}', inputs.rust_components) || '' }}

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2
        with:
          shared-key: rust-quality

      - name: Pre-cargo setup
        if: inputs.pre_cargo_command != ''
        shell: bash
        run: ${{ inputs.pre_cargo_command }}

      - name: cargo fmt
        run: cargo fmt --all -- --check

      - name: cargo clippy
        shell: bash
        run: |
          set -euo pipefail
          features_flag=""
          if [[ -n "${{ inputs.cargo_features }}" ]]; then
            features_flag="--features ${{ inputs.cargo_features }}"
          elif [[ "${{ inputs.all_features }}" == "true" ]]; then
            features_flag="--all-features"
          fi
          cargo clippy --all-targets ${{ inputs.clippy_args }} $features_flag -- -D warnings

      - name: cargo test
        shell: bash
        run: |
          set -euo pipefail
          features_flag=""
          if [[ -n "${{ inputs.cargo_features }}" ]]; then
            features_flag="--features ${{ inputs.cargo_features }}"
          elif [[ "${{ inputs.all_features }}" == "true" ]]; then
            features_flag="--all-features"
          fi
          cargo test ${{ inputs.cargo_test_args }} $features_flag
