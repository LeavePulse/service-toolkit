version: 2
updates:
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "06:00"
      timezone: "Europe/Kyiv"
    labels: ["dependencies", "github-actions"]
    commit-message:
      prefix: "ci"
  - package-ecosystem: "pip"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "06:10"
      timezone: "Europe/Kyiv"
    labels: ["dependencies", "python"]
    commit-message:
      prefix: "deps"
