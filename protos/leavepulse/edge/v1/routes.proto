syntax = "proto3";

package leavepulse.edge.v1;

option java_multiple_files = true;

service EdgeRoutesService {
  rpc GetRoutes(GetRoutesRequest) returns (RoutesResponse);
}

message GetRoutesRequest {}

message RouteItem {
  string source_host = 1;
  string target_url = 2;
}

message RoutesResponse {
  repeated RouteItem items = 1;
  int32 total = 2;
}
