syntax = "proto3";

package leavepulse.server.v1;

option java_multiple_files = true;

service RbacService {
  rpc ServerPermsSnapshot(PermsSnapshotRequest) returns (PermsSnapshotResponse);
  rpc ProjectPermsSnapshot(PermsSnapshotRequest) returns (PermsSnapshotResponse);
}

message PermsSnapshotRequest {
  int64 resource_id = 1;
}

message PermsSnapshotResponse {
  int64 project_id = 1;
  optional int64 owner_user_id = 2;
  bool owner_synced = 3;
  bool published = 4;
}
