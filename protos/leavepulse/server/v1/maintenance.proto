syntax = "proto3";

package leavepulse.server.v1;

option java_multiple_files = true;

service MaintenanceService {
  rpc GetMaintenance(GetMaintenanceRequest) returns (MaintenanceState);
  rpc UpdateEdition(UpdateEditionRequest) returns (UpdateEditionResponse);
  rpc StoreFavicon(StoreFaviconRequest) returns (StoreFaviconResponse);
}

message GetMaintenanceRequest {
  int64 server_id = 1;
}

message MaintenanceState {
  bool enabled = 1;
  optional string message = 2;
}

message UpdateEditionRequest {
  int64 server_id = 1;
  string game_edition = 2;
}

message UpdateEditionResponse {
  ServerCatalogItemBrief item = 1;
}

message ServerCatalogItemBrief {
  string id = 1;
  optional string game_edition = 2;
}

message StoreFaviconRequest {
  int64 server_id = 1;
  string data_url = 2;
  string hash = 3;
}

message StoreFaviconResponse {
  bool updated = 1;
}
