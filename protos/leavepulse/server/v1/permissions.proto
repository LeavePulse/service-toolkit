syntax = "proto3";

package leavepulse.server.v1;

option java_multiple_files = true;

service PermissionsService {
  rpc CheckServerPermission(CheckPermissionRequest) returns (PermissionCheckResponse);
  rpc CheckProjectPermission(CheckPermissionRequest) returns (PermissionCheckResponse);
}

message CheckPermissionRequest {
  int64 resource_id = 1;
  int64 user_id = 2;
  string permission_code = 3;
  optional string scope_type = 4;
  optional int64 scope_id = 5;
}

message PermissionCheckResponse {
  int64 project_id = 1;
  int64 user_id = 2;
  string permission_code = 3;
  bool is_owner = 4;
  string member_state = 5;
  bool has_permission = 6;
  string scope_type = 7;
  optional int64 scope_id = 8;
}
