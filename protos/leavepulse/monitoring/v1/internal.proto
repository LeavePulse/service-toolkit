syntax = "proto3";

package leavepulse.monitoring.v1;

option java_multiple_files = true;

service MonitoringInternalService {
  rpc GetPlayerStats(GetPlayerStatsRequest) returns (PlayerStatsResponse);
  rpc GetLandingStats(GetLandingStatsRequest) returns (LandingStatsResponse);
}

message GetPlayerStatsRequest {
  int64 user_id = 1;
  int64 server_id = 2;
}

message PlayerStatsResponse {
  bool found = 1;
  int64 total_playtime_seconds = 2;
  int64 server_playtime_seconds = 3;
  optional string source = 4;
}

message GetLandingStatsRequest {}

message LandingStatsResponse {
  int64 players_with_profile = 1;
  int64 total_playtime_hours = 2;
  int64 registered_profiles = 3;
}
