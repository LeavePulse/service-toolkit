syntax = "proto3";

package leavepulse.monitoring.v1;

option java_multiple_files = true;

service MonitoringHistoryService {
  rpc GetServerHistory(GetHistoryRequest) returns (HistoryResponse);
  rpc GetProjectHistory(GetHistoryRequest) returns (HistoryResponse);
}

message GetHistoryRequest {
  int64 resource_id = 1;
  string period = 2;
}

message HistoryPoint {
  string collected_at = 1;
  optional double avg_online = 2;
  optional int32 peak_online = 3;
  optional int32 last_online = 4;
  optional int32 max = 5;
  optional string status = 6;
  optional string status_source = 7;
  bool exclude_from_score = 8;
}

message HistoryResponse {
  string period = 1;
  repeated HistoryPoint points = 2;
}
