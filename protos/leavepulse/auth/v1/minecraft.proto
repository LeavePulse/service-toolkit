syntax = "proto3";

package leavepulse.auth.v1;

option java_multiple_files = true;

service MinecraftLinkService {
  rpc CompleteLinkCode(CompleteLinkCodeRequest) returns (CompleteLinkCodeResponse);
}

message CompleteLinkCodeRequest {
  string code = 1;
  string minecraft_nick = 2;
  string minecraft_uuid = 3;
  int64 server_id = 4;
  int64 project_id = 5;
}

message LinkedMinecraftAccount {
  int64 id = 1;
  string account_type = 2;
  string link_source = 3;
  string verification_status = 4;
  string identity_scope_type = 5;
  optional int64 identity_scope_id = 6;
  string minecraft_uuid = 7;
  string minecraft_nick = 8;
  optional int64 proof_server_id = 9;
}

message CompleteLinkCodeResponse {
  string status = 1;
  optional int64 user_id = 2;
  optional LinkedMinecraftAccount account = 3;
}
