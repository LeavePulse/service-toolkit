syntax = "proto3";

package leavepulse.auth.v1;

option java_multiple_files = true;

service UsersService {
  rpc GetProfile(GetProfileRequest) returns (ProfileResponse);
  rpc GetMinecraftAccounts(GetMinecraftAccountsRequest) returns (MinecraftAccountListResponse);
  rpc GetDiscordSubject(GetDiscordSubjectRequest) returns (DiscordSubjectResponse);
  rpc GetContact(GetContactRequest) returns (ContactResponse);
}

message GetProfileRequest {
  int64 user_id = 1;
}

message ProfileResponse {
  bool found = 1;
  optional string username = 2;
  optional string avatar_url = 3;
}

message GetMinecraftAccountsRequest {
  int64 user_id = 1;
}

message MinecraftAccount {
  string account_type = 1;
  string minecraft_uuid = 2;
  string minecraft_nick = 3;
}

message MinecraftAccountListResponse {
  repeated MinecraftAccount items = 1;
}

message GetDiscordSubjectRequest {
  int64 user_id = 1;
}

message DiscordSubjectResponse {
  bool found = 1;
  optional string discord_subject = 2;
}

message GetContactRequest {
  int64 user_id = 1;
}

message ContactResponse {
  bool found = 1;
  optional string email = 2;
  optional string username = 3;
}
