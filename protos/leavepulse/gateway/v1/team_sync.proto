syntax = "proto3";

package leavepulse.gateway.v1;

option java_multiple_files = true;

service GatewayTeamSyncService {
  rpc RefreshMinecraftSync(RefreshMinecraftSyncRequest) returns (MinecraftSyncResponse);
}

message RefreshMinecraftSyncRequest {
  int64 server_id = 1;
  optional int64 role_id = 2;
  bool import_snapshot = 3;
  bool reconcile = 4;
}

message MinecraftSyncResponse {
  int32 roles = 1;
  int32 imported = 2;
  int32 reconciled = 3;
  bool supported = 4;
  optional string message = 5;
}
