syntax = "proto3";

package leavepulse.whitelist.v1;

option java_multiple_files = true;

service WhitelistApplicationsService {
  rpc ListApplications(ListApplicationsRequest) returns (ListApplicationsResponse);
  rpc SetStatus(SetStatusRequest) returns (ApplicationResponse);
  rpc Approve(DecisionRequest) returns (ApplicationResponse);
  rpc Deny(DecisionRequest) returns (ApplicationResponse);
}

message ListApplicationsRequest {
  int64 server_id = 1;
  string status = 2;
  optional int64 actor_user_id = 3;
  optional string review_source = 4;
}

message ListApplicationsResponse {
  repeated Application applications = 1;
}

message SetStatusRequest {
  int64 server_id = 1;
  int64 application_id = 2;
  string status = 3;
  string reason = 4;
  optional int64 actor_user_id = 5;
  optional string review_source = 6;
}

message DecisionRequest {
  int64 server_id = 1;
  int64 application_id = 2;
  string reason = 3;
  optional int64 actor_user_id = 4;
  optional string review_source = 5;
}

message ApplicationResponse {
  Application application = 1;
}

message Application {
  int64 id = 1;
  int64 user_id = 2;
  int64 server_id = 3;
  optional int64 form_id = 4;
  string status = 5;
  optional string status_alias = 6;
  string created_at = 7;
  optional string reviewed_at = 8;
  optional string review_reason = 9;
  bool auto_approved = 10;
  optional string minecraft_account_type = 11;
  optional string minecraft_identity_state = 12;
  optional string minecraft_nick = 13;
  optional string minecraft_uuid = 14;
  optional string discord_name = 15;
  optional string application_url = 16;
  map<string, string> payload = 17;
}
